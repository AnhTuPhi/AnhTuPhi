name: Generate Trophy Card

on:
    schedule:
        - cron: "0 0,6,12 * * *"
    workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v2.3.4

            - name: Generate trophy card
              uses: soulteary/github-profile-trophy-action@v1.0.0
              with:
                  github_user_name: ${{ github.repository_owner }}
                  options: 'username=${{ github.repository_owner }}&theme=gruvbox&column=7&margin-w=15&margin-h=15&title=AllSuperRank,MultiLanguage,Stars,Commits,Follower,Issues,PullRequest&show_icons=true'
                  outputs: |
                      assets/trophy.svg
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Push to GitHub
              uses: EndBug/add-and-commit@v7.2.1
              with:
                  branch: main
                  message: "Generate Trophy Card"
